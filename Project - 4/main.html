<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./css/bootstrap.min.css">

    <style>
        .announcement {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            letter-spacing: 1px;
        }


        .main-header {
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .header-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
        }

        .menu-icon {
            font-size: 22px;
            cursor: pointer;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .header-icons span {
            margin-left: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        .cart small {
            background: #000;
            color: #fff;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 10px;
            margin-left: 3px;
        }


        .nav-bar {
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 35px;
            padding: 12px 0;
            margin: 0;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #222;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .nav-menu li a:hover {
            color: #ff6f2e;
        }
    </style>

</head>

<body>

    <header>

        <!-- announcement bar -->
        <div class="announcement">
            FREE SHIPPING ON ORDERS OVER $50
        </div>


        <!-- main header -->
        <div class="main-header">

            <div class="container">

                <div class="header-flex">

                    <!-- menu icon -->
                    <div class="menu-icon">
                        ☰
                    </div>


                    <!-- logo -->
                    <div class="logo">
                        LOTITA
                    </div>


                    <!-- icons -->
                    <div class="header-icons">

                        <span>🔍</span>
                        <span>👤</span>
                        <span>♡</span>
                        <span class="cart">🛒<small>0</small></span>

                    </div>

                </div>

            </div>

        </div>


        <!-- navigation -->
        <div class="nav-bar">

            <div class="container">

                <ul class="nav-menu">

                    <li><a href="#">NEW IN</a></li>
                    <li><a href="#">DRESSES</a></li>
                    <li><a href="#">TOPS</a></li>
                    <li><a href="#">BOTTOMS</a></li>
                    <li><a href="#">SWIMWEAR</a></li>
                    <li><a href="#">ACCESSORIES</a></li>
                    <li><a href="#">SALE</a></li>

                </ul>

            </div>

        </div>

    </header>


    <script>
        window.addEventListener("scroll", function () {

            let header = document.querySelector(".main-header")

            if (window.scrollY > 50) {
                header.style.position = "fixed"
                header.style.top = "0"
                header.style.width = "100%"
                header.style.zIndex = "999"
            }
            else {
                header.style.position = "relative"
            }

        })
    </script>


</body>

</html>
