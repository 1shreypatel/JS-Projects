<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Bill Calculator</h1>
    <h3 id="prodect1"></h3>
    <h3 id="prodect2"></h3>
    <h3 id="prodect3"></h3>
    <h3 id="total bill"></h3>

    <script>
        let prodect1 = Number(prompt("Enter the price of parodect 1 : "));
        let prodect2 = Number(prompt("Enter the price of prodect 2 :"));
        let prodect3 = Number(prompt("Enter the price of prodect 3 :"));

        let totalBill = prodect1 + prodect2 + prodect3;

        document.getElementById("prodect1").innerText = `price of prodect 1 is : ${prodect1}`;
        document.getElementById("prodect2").innerText = `price of prodect 2 is : ${prodect2}`;
        document.getElementById("prodect3").innerText = `price of prodect 3 is : ${prodect3}`;
        document.getElementById("total bill").innerText = `Your total bill is : ${totalBill}`;

    </script>

</body>
</html>
