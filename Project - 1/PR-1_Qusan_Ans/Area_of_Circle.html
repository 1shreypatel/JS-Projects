<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Area Of Circle</h1>
    <h3 id="r"></h3>
    <h3 id="redius"></h3>

    <script>
        let redius = Number(prompt("Enter the radius of circle : "));
        
        let area = 3.14 * redius * redius;

        document.getElementById("r").innerHTML = `The redius of circle is : ${redius} `;
        document.getElementById("redius").innerHTML = `The area of circle is : ${area} `;
    </script>

</body>
</html>
