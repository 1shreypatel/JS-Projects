<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Currency Converter</h1>
    <h2>92 INR = 1 USD</h2>
    <h3 id="INR"></h3>
    <h3 id="USD"></h3>

    <script>
        let inr = Number(prompt("Enter amount in INR : "));

        let usd = inr / 92;

        document.getElementById("INR").innerText = `Amount in INR : ${inr} INR`;
        document.getElementById("USD").innerText = `Amount in USD : ${usd} USD `;
    </script>

</body>
</html>
