<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>

    <h1>Table</h1>
    <h1 id="demo"></h1>

    <script>
        let num = Number(prompt("Enter Any Number : "));

        for(let i = 1; i <= 10 ; i++){
            let table = num * i;
            document.getElementById("demo").innerHTML += `${num} x ${i} = ${table} <br>`;
        }

    </script>
    
</body>
</html>
