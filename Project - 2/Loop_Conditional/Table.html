<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container {
            width: 480px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h1 {
            margin-bottom: 18px;
            font-size: 28px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        #num {
            color: #4ade80;
            margin-top: 12px;
            font-size: 22px;
            font-weight: 500;
        }

        #table {
            margin-top: 20px;
            font-size: 21px;
            letter-spacing: 1px;
            color: #60a5fa;
            line-height: 2.2;
            background: rgba(96, 165, 250, 0.1);
            padding: 22px;
            border-radius: 15px;
            min-height: 100px;
            border: 1px solid rgba(96, 165, 250, 0.2);
            text-align: left;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Multiplication Table</h1>

        <h1 id="num"></h1>
        <h1 id="table"></h1>
    </div>

    <script>
        let num = Number(prompt("Enter Any Table Number : "));
        document.getElementById("num").innerText = `Table of ${num}`;

        let tableHTML = "";
        for(let i = 1; i <= 10; i++){
            let table = num * i;
            tableHTML += `${num} × ${i} = ${table}<br>`;
        }
        document.getElementById("table").innerHTML = tableHTML;
    </script>

</body>
</html>
